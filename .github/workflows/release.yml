name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install arm64 cross-compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build linux artifacts
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: build --clean --id linux-amd64 --id linux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          path: dist/

  build-darwin:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build darwin artifacts
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: build --clean --id darwin-amd64 --id darwin-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: darwin-dist
          path: dist/

  release:
    name: Release
    needs: [build-linux, build-darwin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: actions/download-artifact@v4
        with:
          name: linux-dist
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: darwin-dist
          path: dist/

      - name: Publish release
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean --skip=build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
