name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install zig
        run: |
          ZIG_VERSION=0.13.0
          ZIG_DIR="$RUNNER_TEMP/zig"
          ZIG_ARCHIVE="$RUNNER_TEMP/zig-linux-x86_64-${ZIG_VERSION}.tar.xz"

          wget -q "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" -O "$ZIG_ARCHIVE"
          rm -rf "$ZIG_DIR"
          mkdir -p "$ZIG_DIR"
          tar -xf "$ZIG_ARCHIVE" -C "$ZIG_DIR" --strip-components=1

          mkdir -p "$HOME/.local/zig"
          cp -R "$ZIG_DIR"/. "$HOME/.local/zig/"
          echo "$HOME/.local/zig" >> $GITHUB_PATH

      - name: Release
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
          ZIG_GLOBAL_CACHE_DIR: /tmp/zig-cache
