name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BINARY_NAME: cardman

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            asset_suffix: linux-amd64
            cc: gcc
            apt_packages: ""
          - name: linux-arm64
            runner: ubuntu-latest
            goos: linux
            goarch: arm64
            asset_suffix: linux-arm64
            cc: aarch64-linux-gnu-gcc
            apt_packages: gcc-aarch64-linux-gnu
          - name: darwin-amd64
            runner: macos-13
            goos: darwin
            goarch: amd64
            asset_suffix: darwin-amd64
            cc: clang
            apt_packages: ""
          - name: darwin-arm64
            runner: macos-14
            goos: darwin
            goarch: arm64
            asset_suffix: darwin-arm64
            cc: clang
            apt_packages: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install Linux cross-compiler
        if: runner.os == 'Linux' && matrix.apt_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Build release archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          PACKAGE_DIR="$RUNNER_TEMP/package"
          ASSET_NAME="${BINARY_NAME}_${VERSION}_${{ matrix.asset_suffix }}.tar.gz"

          rm -rf "$PACKAGE_DIR"
          mkdir -p "$PACKAGE_DIR"

          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${BUILD_DATE} -X main.builtBy=github-actions" \
            -o "$PACKAGE_DIR/${BINARY_NAME}" \
            ./cmd

          cp LICENSE README.md "$PACKAGE_DIR/"
          tar -czf "$ASSET_NAME" -C "$PACKAGE_DIR" "${BINARY_NAME}" LICENSE README.md

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ env.BINARY_NAME }}_${{ github.ref_name }}_${{ matrix.asset_suffix }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: '*'
          merge-multiple: true

      - name: Generate checksums
        run: |
          sha256sum dist/*.tar.gz > dist/checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
