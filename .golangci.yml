run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  disable-all: true
  enable:
    - bodyclose
    - goprintffuncname
    - misspell
    - nolintlint
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - tparallel
    - whitespace
    - gofumpt
    - goimports

linters-settings:
  gofumpt:
    extra-rules: true
    lang-version: "1.25"
  goimports:
    local-prefixes: github.com/laiambryant/tui-cardman
  staticcheck:
    checks: ["all"]
  misspell:
    locale: US
  nolintlint:
    allow-unused: false
    require-explanation: true
    require-specific: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - path: cmd/
      linters:
        - gochecknoglobals
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true
